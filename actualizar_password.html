<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Contraseña - GameControl</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card bg-dark border-primary">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-sync-alt me-2"></i>
                            Actualización de Contraseña - GameControl
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            <strong>Actualización del Sistema:</strong> Se ha cambiado la contraseña del administrador de <code>admin123</code> a <code>kennia23</code>
                        </div>
                        
                        <div class="mb-4">
                            <h5>🔧 Estado del Sistema:</h5>
                            <div id="statusContainer">
                                <div class="text-muted">
                                    <i class="fas fa-spinner fa-spin me-2"></i>
                                    Verificando estado actual...
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <h5>🔑 Nuevas Credenciales:</h5>
                            <div class="bg-secondary p-3 rounded">
                                <strong>Email:</strong> maurochica23@gmail.com<br>
                                <strong>Contraseña:</strong> <span class="text-warning">kennia23</span>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-warning btn-lg" onclick="actualizarSistema()">
                                <i class="fas fa-sync-alt me-2"></i>
                                Actualizar Sistema con Nueva Contraseña
                            </button>
                            
                            <button type="button" class="btn btn-success btn-lg" onclick="irALogin()" id="btnLogin" disabled>
                                <i class="fas fa-sign-in-alt me-2"></i>
                                Ir al Login
                            </button>
                        </div>
                        
                        <div id="logContainer" class="mt-4">
                            <!-- Los logs aparecerán aquí -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === 'success' ? 'check' : type === 'error' ? 'times' : 'info-circle';
            const color = type === 'success' ? 'success' : type === 'error' ? 'danger' : 'info';
            
            logContainer.innerHTML += `
                <div class="alert alert-${color} alert-sm">
                    <i class="fas fa-${icon} me-2"></i>
                    <small>[${timestamp}]</small> ${message}
                </div>
            `;
            
            // Scroll al final
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function verificarEstado() {
            const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            const admin = usuarios.find(u => u.email === 'maurochica23@gmail.com');
            
            const statusContainer = document.getElementById('statusContainer');
            
            if (!admin) {
                statusContainer.innerHTML = `
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Usuario administrador no encontrado en localStorage</strong><br>
                        Es necesario recrear el usuario con la nueva contraseña.
                    </div>
                `;
                return false;
            } else if (admin.password === 'kennia23') {
                statusContainer.innerHTML = `
                    <div class="alert alert-success">
                        <i class="fas fa-check-circle me-2"></i>
                        <strong>✅ Sistema actualizado correctamente</strong><br>
                        El usuario administrador ya tiene la nueva contraseña: <code>kennia23</code>
                    </div>
                `;
                document.getElementById('btnLogin').disabled = false;
                return true;
            } else {
                statusContainer.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="fas fa-times-circle me-2"></i>
                        <strong>❌ Contraseña desactualizada</strong><br>
                        El usuario tiene contraseña: <code>${admin.password}</code><br>
                        Necesita actualización a: <code>kennia23</code>
                    </div>
                `;
                return false;
            }
        }
        
        function actualizarSistema() {
            log('🔄 Iniciando actualización del sistema...', 'info');
            
            // 1. Obtener usuarios actuales
            let usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
            log(`📋 Usuarios encontrados: ${usuarios.length}`, 'info');
            
            // 2. Buscar usuario administrador
            const adminIndex = usuarios.findIndex(u => u.email === 'maurochica23@gmail.com');
            
            if (adminIndex !== -1) {
                log('👤 Usuario administrador encontrado. Actualizando contraseña...', 'info');
                usuarios[adminIndex].password = 'kennia23';
                usuarios[adminIndex].ultimaModificacion = new Date().toISOString();
                log(`🔐 Contraseña actualizada de "${usuarios[adminIndex].password || 'anterior'}" a "kennia23"`, 'success');
            } else {
                log('👤 Usuario administrador no encontrado. Creando nuevo usuario...', 'info');
                
                const nuevoAdmin = {
                    id: 'admin_real_001',
                    nombre: 'Mauro Chica',
                    email: 'maurochica23@gmail.com',
                    password: 'kennia23',
                    rol: 'administrador',
                    estado: 'activo',
                    fechaCreacion: new Date().toISOString(),
                    ultimaModificacion: new Date().toISOString(),
                    ultimoAcceso: null,
                    permisos: {
                        dashboard: true,
                        salas: true,
                        ventas: true,
                        gastos: true,
                        stock: true,
                        reportes: true,
                        usuarios: true,
                        ajustes: true
                    }
                };
                
                usuarios.push(nuevoAdmin);
                log('✅ Usuario administrador creado exitosamente', 'success');
            }
            
            // 3. Guardar cambios
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            log('💾 Cambios guardados en localStorage', 'success');
            
            // 4. Limpiar sesión actual (si existe)
            localStorage.removeItem('sesionActual');
            log('🧹 Sesión actual limpiada', 'info');
            
            // 5. Verificar resultado
            setTimeout(() => {
                const verificacion = verificarEstado();
                if (verificacion) {
                    log('🎉 ¡Actualización completada exitosamente!', 'success');
                    document.getElementById('btnLogin').disabled = false;
                } else {
                    log('❌ Error en la verificación. Inténtalo nuevamente.', 'error');
                }
            }, 500);
        }
        
        function irALogin() {
            log('🔗 Redirigiendo al login...', 'info');
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1000);
        }
        
        // Verificar estado al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            log('🟢 Página cargada. Verificando estado del sistema...', 'info');
            setTimeout(verificarEstado, 1000);
        });
    </script>
</body>
</html>
