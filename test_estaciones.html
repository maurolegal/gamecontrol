<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Estaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Test de Estaciones</h1>
        
        <div class="salas-grid-minimal" id="contenedorSalas">
            <!-- Aquí se cargarán las salas -->
        </div>
    </div>

    <script>
        // Datos de prueba
        const salasPrueba = [
            {
                id: '1',
                nombre: 'Sala Gaming 1',
                tipo: 'pc',
                numEstaciones: 4,
                prefijo: 'EST',
                tarifa: 5
            },
            {
                id: '2',
                nombre: 'Sala Gaming 2',
                tipo: 'ps5',
                numEstaciones: 3,
                prefijo: 'PS5',
                tarifa: 6
            }
        ];

        const sesionesPrueba = [];

        function crearHTMLSala(sala) {
            const sesionesActivas = sesionesPrueba.filter(s => s.salaId === sala.id && !s.finalizada);
            const tipoInfo = {
                pc: { icon: 'fas fa-desktop', nombre: 'PC Gaming' },
                ps5: { icon: 'fas fa-gamepad', nombre: 'PlayStation 5' }
            }[sala.tipo] || { icon: 'fas fa-gamepad', nombre: 'Consola' };
            
            const ocupadas = sesionesActivas.length;
            const totalEstaciones = sala.numEstaciones;
            const disponibles = Math.max(0, totalEstaciones - ocupadas);
            
            return `
                <div class="sala-card-minimal" data-id="${sala.id}" data-tipo="${sala.tipo}">
                    <div class="sala-header-minimal">
                        <div class="sala-info-minimal">
                            <div class="sala-title-minimal">
                                <i class="${tipoInfo.icon}"></i>
                                ${sala.nombre}
                                <span class="sala-type-badge">${tipoInfo.nombre}</span>
                            </div>
                            <div class="sala-stats-minimal">
                                <div class="sala-stat">
                                    <i class="fas fa-tv"></i>
                                    <span>${sala.numEstaciones} estaciones</span>
                                </div>
                                <div class="sala-stat">
                                    <i class="fas fa-dollar-sign"></i>
                                    <span class="tarifa-valor">$${sala.tarifa}/h</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="estaciones-grid-minimal">
                        ${generarHTMLEstacionesMinimal(sala, sesionesActivas)}
                    </div>
                    
                    <div class="sala-footer-minimal">
                        <div class="ocupacion-minimal">
                            <div class="ocupacion-item disponibles">
                                <i class="fas fa-check-circle"></i>
                                <span>${disponibles} libre${disponibles !== 1 ? 's' : ''}</span>
                            </div>
                            <div class="ocupacion-item ocupadas">
                                <i class="fas fa-clock"></i>
                                <span>${ocupadas} en uso</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function generarHTMLEstacionesMinimal(sala, sesionesActivas) {
            let html = '';
            for (let i = 1; i <= sala.numEstaciones; i++) {
                const estacion = `${sala.prefijo}${i}`;
                const sesion = sesionesActivas.find(s => s.estacion === estacion);
                const estaOcupada = !!sesion;
                
                html += `
                    <div class="estacion-minimal ${estaOcupada ? 'ocupada' : 'disponible'}" 
                         data-estacion="${estacion}">
                        <div class="estacion-numero-minimal">${estacion}</div>
                        <div class="estacion-status-minimal">
                            ${estaOcupada ? 'En Uso' : 'Libre'}
                        </div>
                        ${estaOcupada ? 
                            `<div class="estacion-sesion-minimal">
                                <div class="cliente-minimal">Cliente</div>
                                <div class="tiempo-minimal">00:30</div>
                            </div>` : 
                            `<div class="estacion-disponible-acciones">
                                <button class="btn btn-primary btn-iniciar-minimal">
                                    <i class="fas fa-play me-1"></i>Iniciar
                                </button>
                            </div>`
                        }
                    </div>
                `;
            }
            return html;
        }

        // Cargar datos de prueba
        document.addEventListener('DOMContentLoaded', () => {
            const contenedor = document.getElementById('contenedorSalas');
            if (contenedor) {
                contenedor.innerHTML = salasPrueba.map(sala => crearHTMLSala(sala)).join('');
                console.log('Estaciones cargadas:', salasPrueba.length, 'salas');
            }
        });
    </script>
</body>
</html>
