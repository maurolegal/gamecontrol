<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; font-family: monospace; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
        .log-info { color: #007bff; }
        .log-success { color: #28a745; font-weight: bold; }
        .log-error { color: #dc3545; font-weight: bold; background: #fff0f0; padding: 5px; }
        .log-warn { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Diagnóstico de Carga de Index</h1>
        <div class="mb-3">
            <button onclick="window.location.reload()" class="btn btn-primary">Recargar</button>
            <a href="index.html" class="btn btn-secondary">Ir a Index</a>
            <a href="login.html" class="btn btn-warning">Ir a Login</a>
        </div>
        
        <div class="card">
            <div class="card-header">Log de Ejecución</div>
            <div class="card-body" id="log-container" style="height: 500px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- Scripts necesarios -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    
    <script>
        function log(msg, type = 'info') {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.className = `log-entry log-${type}`;
            div.textContent = `[${new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit', hour12: true})}] ${msg}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            console.log(msg);
        }

        async function runDiagnostics() {
            log('Iniciando diagnóstico completo...', 'info');
            log('==========================================', 'info');

            // 1. Verificar Supabase
            log('1️⃣ Verificando librería Supabase...', 'info');
            if (window.supabase && window.supabase.createClient) {
                log('✅ Librería Supabase cargada correctamente', 'success');
            } else {
                log('❌ Librería Supabase NO encontrada', 'error');
                log('Contenido de window.supabase: ' + typeof window.supabase, 'error');
                return;
            }

            // 2. Verificar Configuración
            log('2️⃣ Verificando configuración...', 'info');
            if (window.supabaseConfig) {
                log('✅ Configuración Supabase encontrada', 'success');
                log('Métodos disponibles: ' + Object.keys(window.supabaseConfig).join(', '), 'info');
            } else {
                log('❌ Configuración Supabase NO encontrada', 'error');
                return;
            }

            // 3. Obtener Cliente
            log('3️⃣ Obteniendo cliente Supabase...', 'info');
            let client;
            try {
                client = await window.supabaseConfig.getSupabaseClient();
                if (client) {
                    log('✅ Cliente Supabase inicializado', 'success');
                } else {
                    log('❌ Cliente Supabase es null', 'error');
                    return;
                }
            } catch (e) {
                log(`❌ Error obteniendo cliente: ${e.message}`, 'error');
                log(`Stack: ${e.stack}`, 'error');
                return;
            }

            // 4. Verificar Sesión Supabase Auth
            log('4️⃣ Verificando sesión Supabase Auth...', 'info');
            try {
                const { data: { session }, error } = await client.auth.getSession();
                if (error) {
                    log(`❌ Error obteniendo sesión: ${error.message}`, 'error');
                } else if (session) {
                    log(`✅ Sesión activa encontrada para: ${session.user.email}`, 'success');
                    log(`User ID: ${session.user.id}`, 'info');
                    
                    // 5. Verificar Datos de Usuario en BD
                    log('5️⃣ Verificando datos de usuario en BD...', 'info');
                    const { data: user, error: userError } = await client
                        .from('usuarios')
                        .select('*')
                        .eq('id', session.user.id)
                        .single();
                    
                    if (userError) {
                        log(`❌ Error obteniendo datos de usuario: ${userError.message}`, 'error');
                        log(`Código de error: ${userError.code}`, 'error');
                        log(`Detalles: ${JSON.stringify(userError)}`, 'error');
                    } else if (user) {
                        log(`✅ Datos de usuario obtenidos: ${user.nombre} (${user.rol})`, 'success');
                        log(`Email: ${user.email}`, 'info');
                        log(`Estado: ${user.estado}`, 'info');
                        log(`Permisos: ${JSON.stringify(user.permisos)}`, 'info');
                    } else {
                        log('⚠️ Usuario no encontrado en tabla usuarios', 'warn');
                    }

                } else {
                    log('⚠️ No hay sesión activa en Supabase Auth', 'warn');
                    
                    // 6. Verificar localStorage
                    log('6️⃣ Verificando localStorage...', 'info');
                    const localSession = localStorage.getItem('sesionActual');
                    if (localSession) {
                        log('✅ Sesión encontrada en localStorage', 'success');
                        try {
                            const parsed = JSON.parse(localSession);
                            log(`Usuario local: ${parsed.nombre} (${parsed.email})`, 'info');
                            log(`Rol: ${parsed.rol}`, 'info');
                            log(`Fecha login: ${parsed.fechaLogin}`, 'info');
                            log(`Permisos: ${JSON.stringify(parsed.permisos)}`, 'info');
                        } catch (e) {
                            log('❌ Error parseando sesión local: ' + e.message, 'error');
                        }
                    } else {
                        log('❌ No hay sesión en localStorage tampoco', 'error');
                        log('🔴 NO HAY SESIÓN ACTIVA - Usuario debe hacer login', 'error');
                    }
                }
            } catch (e) {
                log(`❌ Excepción verificando sesión: ${e.message}`, 'error');
                log(`Stack: ${e.stack}`, 'error');
            }
            
            // 7. Verificar Scripts cargados
            log('7️⃣ Verificando scripts cargados...', 'info');
            const scriptsToCheck = {
                'window.sessionManager': typeof window.sessionManager,
                'window.authSystem': typeof window.authSystem,
                'window.DashboardManager': typeof window.DashboardManager,
                'window.databaseService': typeof window.databaseService,
                'window.mostrarNotificacion': typeof window.mostrarNotificacion
            };
            
            for (const [name, type] of Object.entries(scriptsToCheck)) {
                if (type === 'undefined') {
                    log(`❌ ${name} NO está disponible`, 'error');
                } else {
                    log(`✅ ${name} disponible (${type})`, 'success');
                }
            }
            
            // 8. Test de conexión a BD
            log('8️⃣ Probando conexión directa a BD...', 'info');
            try {
                const { data, error } = await client.from('configuracion').select('*').limit(1);
                if (error) {
                    log(`❌ Error conectando a BD: ${error.message}`, 'error');
                } else {
                    log(`✅ Conexión a BD exitosa, registros obtenidos: ${data?.length || 0}`, 'success');
                }
            } catch (e) {
                log(`❌ Excepción conectando a BD: ${e.message}`, 'error');
            }
            
            log('==========================================', 'info');
            log('Diagnóstico completado', 'info');
        }

        window.addEventListener('load', () => {
            log('Esperando 2 segundos para que los scripts se carguen...', 'info');
            setTimeout(runDiagnostics, 2000);
        });
    </script>
</body>
</html>
