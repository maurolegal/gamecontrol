<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Categorías</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
</head>
<body class="p-4">
    <div class="container">
        <h1>Diagnóstico de Categorías (Configuración)</h1>
        <div class="mb-3">
            <button class="btn btn-primary" onclick="diagnosticar()">Ejecutar Diagnóstico</button>
            <button class="btn btn-warning" onclick="intentarEscritura()">Prueba de Escritura</button>
        </div>
        <div id="logs" class="bg-light p-3 border rounded font-monospace" style="height: 500px; overflow-y: auto;"></div>
    </div>

    <script>
        function log(msg, data = null) {
            const div = document.getElementById('logs');
            const time = new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit', hour12: true});
            let html = `<div><span class="text-muted">[${time}]</span> ${msg}</div>`;
            if (data) {
                html += `<pre class="text-primary small ms-4">${JSON.stringify(data, null, 2)}</pre>`;
            }
            div.innerHTML += html;
            div.scrollTop = div.scrollHeight;
            console.log(msg, data);
        }

        async function diagnosticar() {
            log('Iniciando diagnóstico...');
            try {
                const client = await window.supabaseConfig.getSupabaseClient();
                
                // 1. Verificar sesión
                const { data: { session } } = await client.auth.getSession();
                log('Sesión actual:', session ? `Usuario: ${session.user.email}` : 'NO HAY SESIÓN');

                // 2. Leer configuracion
                log('Leyendo tabla configuracion...');
                const { data: config, error: configError } = await client
                    .from('configuracion')
                    .select('*')
                    .limit(5);

                if (configError) {
                    log('ERROR leyendo configuracion:', configError);
                } else {
                    log('Datos encontrados en configuracion:', config);
                    if (config.length > 0) {
                        const row = config[0];
                        log('Analizando fila 0:', {
                            id: row.id,
                            hasDatos: !!row.datos,
                            typeofDatos: typeof row.datos,
                            keysDatos: row.datos ? Object.keys(row.datos) : []
                        });
                    }
                }

            } catch (e) {
                log('Excepción:', e);
            }
        }

        async function intentarEscritura() {
            log('Iniciando prueba de escritura...');
            try {
                const client = await window.supabaseConfig.getSupabaseClient();
                
                // Leer primero
                const { data: config } = await client.from('configuracion').select('*').limit(1);
                
                if (config && config.length > 0) {
                    const row = config[0];
                    log('Intentando actualizar fila:', row.id);
                    
                    const nuevosDatos = {
                        ...(row.datos || {}),
                        _debug_timestamp: new Date().toISOString()
                    };

                    const { data: updateData, error: updateError } = await client
                        .from('configuracion')
                        .update({ datos: nuevosDatos })
                        .eq('id', row.id)
                        .select();

                    if (updateError) {
                        log('❌ ERROR al actualizar:', updateError);
                    } else {
                        log('✅ Actualización exitosa. Resultado:', updateData);
                    }
                } else {
                    log('No hay filas para actualizar. Intentando insertar...');
                    const { data: insertData, error: insertError } = await client
                        .from('configuracion')
                        .insert([{ 
                            datos: { 
                                _debug_init: true,
                                categorias_productos: [] 
                            } 
                        }])
                        .select();
                        
                    if (insertError) {
                        log('❌ ERROR al insertar:', insertError);
                    } else {
                        log('✅ Inserción exitosa. Resultado:', insertData);
                    }
                }

            } catch (e) {
                log('Excepción en escritura:', e);
            }
        }
    </script>
</body>
</html>
