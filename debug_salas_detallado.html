<!DOCTYPE html>
<html lang="es">
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Salas Detallado</title>
    <script>
        (function(){
            try{var t=localStorage.getItem('theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}catch(e){}
        })();
    </script>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        [data-theme="dark"] #consoleOutput { background: var(--light-color) !important; color: var(--text-color) !important; }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1>Debug Salas Detallado</h1>
        
        <div class="row">
            <div class="col-md-12">
                <h3>Estado del Sistema</h3>
                <div id="estadoSistema"></div>
                
                <hr>
                
                <h3>Prueba de CONFIG</h3>
                <div id="configInfo"></div>
                
                <hr>
                
                <h3>Prueba de Salas</h3>
                <div id="contenedorSalas" class="salas-grid-minimal">
                    <!-- Las salas se cargarán aquí -->
                </div>
                
                <hr>
                
                <h3>Consola del Navegador</h3>
                <div id="consoleOutput" style="background: #f8f9fa; padding: 15px; border-radius: 5px; font-family: monospace; max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // Interceptar console.log para mostrar en la página
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('consoleOutput');
        
        function addToConsole(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `text-${type === 'error' ? 'danger' : 'info'}`;
            div.textContent = `[${new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit', hour12: true})}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '));
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        // Configuración global (evitar redeclaración)
        try { CONFIG; } catch (e) {
            window.CONFIG = window.CONFIG || {
                tiposConsola: {
                    playstation: { prefijo: 'PS', icon: 'fab fa-playstation', nombre: 'PlayStation' },
                    xbox: { prefijo: 'XB', icon: 'fab fa-xbox', nombre: 'Xbox' },
                    nintendo: { prefijo: 'NT', icon: 'fas fa-gamepad', nombre: 'Nintendo' },
                    pc: { prefijo: 'PC', icon: 'fas fa-desktop', nombre: 'PC' }
                }
            };
            const CONFIG = window.CONFIG;
        }
        
        // Datos de prueba
        const salasPrueba = [
            {
                id: '1',
                nombre: 'Sala PS5',
                tipo: 'playstation',
                numEstaciones: 4,
                prefijo: 'PS5',
                tarifa: 2000
            },
            {
                id: '2',
                nombre: 'Sala Xbox',
                tipo: 'xbox',
                numEstaciones: 2,
                prefijo: 'XB',
                tarifa: 1800
            },
            {
                id: '3',
                nombre: 'Sala PC',
                tipo: 'pc',
                numEstaciones: 3,
                prefijo: 'PC',
                tarifa: 1500
            }
        ];
        
        // Función para crear HTML de sala (copiada de salas.js)
        function crearHTMLSala(sala) {
            console.log('🔍 DEBUG crearHTMLSala() para sala:', sala);
            
            const tipoInfo = CONFIG.tiposConsola[sala.tipo];
            console.log('  - tipoInfo encontrado:', tipoInfo);
            
            if (!tipoInfo) {
                console.error('❌ No se encontró tipoInfo para:', sala.tipo);
                console.log('  - CONFIG.tiposConsola:', CONFIG.tiposConsola);
                console.log('  - sala.tipo:', sala.tipo);
                console.log('  - Tipos disponibles:', Object.keys(CONFIG.tiposConsola));
            }
            
            const tarifaActual = sala.tarifa || 0;
            const totalEstaciones = Number.isFinite(sala.numEstaciones) ? sala.numEstaciones : 0;
            
            return `
                <div class="sala-card-minimal" data-id="${sala.id}" data-tipo="${sala.tipo}">
                    <div class="sala-header-minimal">
                        <div class="sala-info-minimal">
                            <div class="sala-title-minimal">
                                <i class="${tipoInfo ? tipoInfo.icon : 'fas fa-gamepad'}"></i>
                                ${sala.nombre}
                                <span class="sala-type-badge">${tipoInfo ? tipoInfo.nombre : 'Consola'}</span>
                            </div>
                            <div class="sala-stats-minimal">
                                <div class="sala-stat">
                                    <i class="fas fa-tv"></i>
                                    <span>${sala.numEstaciones} estaciones</span>
                                </div>
                                <div class="sala-stat">
                                    <i class="fas fa-dollar-sign"></i>
                                    <span class="tarifa-valor">$${tarifaActual}/h</span>
                                </div>
                            </div>
                        </div>
                        <div class="sala-actions-minimal">
                            <button class="btn btn-outline-primary btn-sm" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="estaciones-grid-minimal">
                        ${generarHTMLEstaciones(sala)}
                    </div>
                    
                    <div class="sala-footer-minimal">
                        <div class="ocupacion-minimal">
                            <div class="ocupacion-item disponibles">
                                <i class="fas fa-check-circle"></i>
                                <span>${totalEstaciones} disponibles</span>
                            </div>
                            <div class="ocupacion-item ocupadas">
                                <i class="fas fa-circle text-danger"></i>
                                <span>0 ocupadas</span>
                            </div>
                        </div>
                        <div class="tarifa-minimal">
                            <span class="tarifa-label">Tarifa:</span>
                            <span class="tarifa-valor">$${tarifaActual}/h</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function generarHTMLEstaciones(sala) {
            let html = '';
            for (let i = 1; i <= sala.numEstaciones; i++) {
                const estacion = `${sala.prefijo}${i}`;
                html += `
                    <div class="estacion-minimal disponible" data-estacion="${estacion}">
                        <div class="estacion-numero-minimal">${estacion}</div>
                        <div class="estacion-status-minimal">Libre</div>
                        <button class="btn btn-success btn-sm">
                            <i class="fas fa-play"></i>
                        </button>
                    </div>
                `;
            }
            return html;
        }
        
        // Función para mostrar información de debug
        function mostrarDebugInfo() {
            const debugInfo = document.getElementById('estadoSistema');
            const configInfo = document.getElementById('configInfo');
            
            debugInfo.innerHTML = `
                <p><strong>Salas de prueba:</strong> ${salasPrueba.length}</p>
                <p><strong>CONFIG definido:</strong> ${typeof CONFIG !== 'undefined' ? 'Sí' : 'No'}</p>
                <p><strong>CONFIG.tiposConsola:</strong> ${CONFIG && CONFIG.tiposConsola ? 'Sí' : 'No'}</p>
                <p><strong>Tipos disponibles:</strong> ${CONFIG && CONFIG.tiposConsola ? Object.keys(CONFIG.tiposConsola).join(', ') : 'N/A'}</p>
            `;
            
            configInfo.innerHTML = `
                <p><strong>CONFIG completo:</strong></p>
                <pre>${JSON.stringify(CONFIG, null, 2)}</pre>
                
                <p><strong>Prueba de tipos:</strong></p>
                <ul>
                    ${Object.entries(CONFIG.tiposConsola).map(([tipo, info]) => 
                        `<li><strong>${tipo}:</strong> ${JSON.stringify(info)}</li>`
                    ).join('')}
                </ul>
            `;
        }
        
        // Función para cargar salas
        function cargarSalas() {
            console.log('🔍 DEBUG cargarSalas() iniciando...');
            const contenedor = document.getElementById('contenedorSalas');
            
            if (contenedor) {
                console.log('  - Contenedor encontrado, cargando', salasPrueba.length, 'salas');
                
                // Probar cada sala individualmente
                salasPrueba.forEach((sala, index) => {
                    console.log(`  - Procesando sala ${index + 1}:`, sala);
                    const htmlSala = crearHTMLSala(sala);
                    console.log(`  - HTML generado para sala ${index + 1}:`, htmlSala.substring(0, 100) + '...');
                });
                
                contenedor.innerHTML = salasPrueba.map(sala => crearHTMLSala(sala)).join('');
                console.log('✅ Salas cargadas correctamente');
            } else {
                console.error('❌ Contenedor no encontrado');
            }
        }
        
        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM cargado, inicializando debug detallado...');
            
            setTimeout(() => {
                mostrarDebugInfo();
                cargarSalas();
                
                // Verificar si hay errores en la consola
                console.log('🔍 Verificando estado final...');
                console.log('  - CONFIG:', CONFIG);
                console.log('  - salasPrueba:', salasPrueba);
                console.log('  - contenedor:', document.getElementById('contenedorSalas'));
            }, 100);
        });
    </script>
    <script src="js/theme-ux.js"></script>
    
    <style>
        .salas-grid-minimal {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        
        .sala-card-minimal {
            background: #ffffff;
            border-radius: 8px;
            border: 1px solid rgba(0, 123, 255, 0.1);
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .sala-header-minimal {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e9ecef;
        }
        
        .sala-info-minimal {
            flex: 1;
        }
        
        .sala-title-minimal {
            font-size: 1.25rem;
            font-weight: 600;
            color: #212529;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .sala-type-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            background: rgba(0, 123, 255, 0.1);
            color: #007bff;
            font-weight: 500;
        }
        
        .estaciones-grid-minimal {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .estacion-minimal {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        
        .estacion-minimal.disponible {
            background: #d4edda;
            border-color: #c3e6cb;
        }
        
        .estacion-numero-minimal {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .estacion-status-minimal {
            font-size: 0.875rem;
            color: #6c757d;
            margin-bottom: 0.5rem;
        }
        
        .sala-footer-minimal {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #e9ecef;
        }
        
        .ocupacion-minimal {
            display: flex;
            gap: 1rem;
        }
        
        .ocupacion-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        
        .ocupacion-item.disponibles {
            color: #28a745;
        }
        
        .ocupacion-item.ocupadas {
            color: #dc3545;
        }
        
        .tarifa-minimal {
            text-align: right;
        }
        
        .tarifa-label {
            font-size: 0.875rem;
            color: #6c757d;
            margin-right: 0.5rem;
        }
        
        .tarifa-valor {
            font-weight: 600;
            color: #28a745;
        }
    </style>
</body>
</html>
