<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Debug Stock Sales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/database-service.js"></script>
</head>
<body class="p-4">
    <h1>Diagnóstico de Ventas de Stock</h1>
    <div id="status" class="alert alert-info">Iniciando...</div>
    <div id="output" class="bg-light p-3 border rounded font-monospace" style="white-space: pre-wrap;"></div>

    <script>
        function log(msg, type = 'info') {
            const el = document.getElementById('output');
            el.innerHTML += `<div class="text-${type}">${msg}</div>`;
            console.log(msg);
        }

        async function runTest() {
            try {
                // 1. Inicializar DatabaseService
                window.databaseService = new DatabaseService();
                await window.databaseService.inicializar();
                
                log('✅ DatabaseService inicializado');

                // 2. Definir fecha de hoy
                const hoy = new Date();
                hoy.setHours(0, 0, 0, 0);
                const hoyISO = hoy.toISOString();
                log(`📅 Fecha de corte (hoy 00:00 local): ${hoy.toLocaleString()} -> ${hoyISO}`);

                // 3. Consultar SOLO movimientos (sin join) para ver si hay datos
                log('🔍 Consultando tabla movimientos_stock (simple)...');
                const resSimple = await window.databaseService.select('movimientos_stock', {
                    filtros: { 
                        tipo: 'venta',
                        'fecha_movimiento': { operador: 'gte', valor: hoyISO }
                    },
                    select: '*',
                    limite: 5
                });

                if (!resSimple.success) {
                    log(`❌ Error consulta simple: ${resSimple.error}`, 'danger');
                } else {
                    log(`✅ Consulta simple OK. Encontrados: ${resSimple.data.length}`);
                    log(JSON.stringify(resSimple.data, null, 2));
                }

                // 4. Consultar con JOIN productos
                log('🔍 Consultando con JOIN a productos...');
                const resJoin = await window.databaseService.select('movimientos_stock', {
                    filtros: { 
                        tipo: 'venta',
                        'fecha_movimiento': { operador: 'gte', valor: hoyISO }
                    },
                    select: '*, producto:productos(nombre)',
                    ordenPor: { campo: 'fecha_movimiento', direccion: 'desc' },
                    limite: 5
                });

                if (!resJoin.success) {
                    log(`❌ Error consulta con JOIN: ${JSON.stringify(resJoin)}`, 'danger');
                    // Intento alternativo de sintaxis de join
                    log('🔄 Probando sintaxis alternativa de JOIN: *, productos(nombre)...');
                         const resJoin2 = await window.databaseService.select('movimientos_stock', {
                        filtros: { 
                            tipo: 'venta',
                            'fecha_movimiento': { operador: 'gte', valor: hoyISO }
                        },
                        select: '*, productos(nombre)', // Sin alias
                        limite: 5
                    });
                     if (resJoin2.success) {
                        log(`✅ Sintaxis alternativa OK. Encontrados: ${resJoin2.data.length}`, 'success');
                        log(JSON.stringify(resJoin2.data, null, 2));
                     } else {
                         log(`❌ Sintaxis alternativa también falló`, 'danger');
                     }

                } else {
                    log(`✅ Consulta con JOIN OK. Encontrados: ${resJoin.data.length}`, 'success');
                    log(JSON.stringify(resJoin.data, null, 2));
                }

            } catch (e) {
                log(`❌ Excepción: ${e.message}`, 'danger');
                console.error(e);
            }
        }

        window.addEventListener('load', runTest);
    </script>
</body>
</html>
