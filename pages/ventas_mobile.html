<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e293b">
    <title>Ventas - GameControl</title>
    <script>
        (function(){
            try {
                var t = localStorage.getItem('theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', t);
            } catch(e) {}
        })();
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/salas-mobile-native.css">
    <script src="../js/security-production.js"></script>
    <style>
        .venta-card {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .venta-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .venta-id {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .venta-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        .venta-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }
        .venta-total {
            grid-column: 1 / -1;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dotted rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary-color);
        }
        .btn-filter-mobile {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="salas-page salas-corporate salas-mobile-native ventas-mobile">

    <!-- Header (native-like) -->
    <header class="gc-header">
        <div class="gc-header-row">
            <div class="gc-title px-0">
                <button onclick="window.location.href='../index.html'" class="btn btn-link text-white p-0 me-2">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <div style="min-width:0">
                    <h1>Ventas</h1>
                    <p class="gc-subtitle">Registro historico</p>
                </div>
            </div>
            <div class="gc-actions">
                <button class="gc-iconbtn" type="button" onclick="window.location.reload()" aria-label="Actualizar">
                    <i class="fas fa-sync-alt"></i>
                </button>
                <div class="dropdown">
                    <button class="gc-iconbtn" type="button" id="userMenuBtn" data-bs-toggle="dropdown" aria-label="Menú de usuario">
                        <i class="fas fa-user"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenuBtn">
                        <li><a class="dropdown-item" href="ajustes.html"><i class="fas fa-cog me-2"></i> Ajustes</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="window.navigationUtils.logout()"><i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <!-- Stats -->
    <section class="gc-stats" aria-label="Resumen">
        <div class="gc-stat is-primary">
            <span class="v" id="mvTotalVentas">$0</span>
            <span class="l">Ventas Hoy</span>
        </div>
        <div class="gc-stat is-success">
            <span class="v" id="mvTransacciones">0</span>
            <span class="l">Tickets</span>
        </div>
        <div class="gc-stat">
            <span class="v" id="mvTicketPromedio">$0</span>
            <span class="l">Promedio</span>
        </div>
    </section>

    <!-- Filtros Mobile -->
    <div class="px-3 py-2 d-flex gap-2 align-items-center" style="overflow-x: auto; white-space: nowrap;">
        <select id="filtroPeriodo" class="btn-filter-mobile text-dark" style="background: white;">
            <option value="hoy">Hoy</option>
            <option value="ayer">Ayer</option>
            <option value="semana">Semana</option>
            <option value="mes" selected>Mes</option>
        </select>
        <!-- Elementos ocultos requeridos por ventas.js -->
        <input type="hidden" id="filtroSala" value="">
        <input type="hidden" id="filtroMetodoPago" value="">
        <input type="hidden" id="fechaInicio">
        <input type="hidden" id="fechaFin">
        <button id="aplicarFiltros" style="display:none"></button>
        <button id="limpiarFiltros" style="display:none"></button>
        <div id="tagsResumen" style="display:none"></div>
        <div id="rangoFechas" style="display:none"></div>
    </div>

    <!-- Contenido Principal -->
    <main class="gc-content" style="padding-bottom: 90px; padding-top: 10px;">
        
        <div class="d-flex align-items-center justify-content-between mb-3 px-1">
            <div class="d-flex align-items-center gap-2">
                <i class="fas fa-receipt text-primary"></i>
                <h2 class="h6 mb-0 text-uppercase fw-bold text-light" style="letter-spacing: 0.5px;">Historial</h2>
            </div>
            <div id="info-paginacion" class="small text-muted"></div>
        </div>

        <div id="contenedorVentasMobile" class="container-fluid px-1">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">Cargando ventas...</p>
            </div>
        </div>
        
        <!-- Elemento oculto para compatibilidad con JS -->
        <table style="display:none"><tbody id="tablaVentasBody"></tbody></table>

    </main>

    <!-- Bottom Navigation (native-like) -->
    <nav class="gc-bottomnav" aria-label="Navegación">
        <div class="row">
            <a href="../index.html" class="gc-tab">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="salas_mobile.html" class="gc-tab">
                <i class="fas fa-gamepad"></i>
                <span>Salas</span>
            </a>
            <a href="stock.html" class="gc-tab">
                <i class="fas fa-box"></i>
                <span>Stock</span>
            </a>
            <a href="ventas.html" class="gc-tab active">
                <i class="fas fa-cash-register"></i>
                <span>Ventas</span>
            </a>
        </div>
    </nav>

    <!-- ===== SUPABASE SDK ===== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/database-service.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/navigation-utils.js"></script>
    <script src="../js/auth.js"></script>
    
    <!-- Script principal modificado para detectar mobile -->
    <script src="../js/ventas.js"></script>
    
    <script>
        // Inicializar filtros
        document.getElementById('filtroPeriodo').addEventListener('change', function() {
            if(window.gestorVentas) {
                window.gestorVentas.actualizarHistorialVentas();
                window.gestorVentas.actualizarEstadisticas();
            }
        });
    </script>
</body>
</html>
