<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Iniciar sesión - GameControl</title>

  <!-- CSS base -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/corporate-theme.css">

  <style>
    /* Ensure dark background overrides corporate theme */
    body.corporate, body { background: #0f172a !important; min-height: 100vh; display: grid; place-items: center; }
    .login-card {
      width: 100%; max-width: 420px; background: #0b1325; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      color: #e5e7eb;
    }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .login-logo i { color: #4a90e2; font-size: 1.4rem; }
    .login-title { margin: 0; font-weight: 700; color: #fff; }
    .muted { color: #94a3b8; }
    /* Inputs claros con texto negro para facilitar el llenado */
    .form-control { background: #ffffff; border: 1px solid rgba(0,0,0,0.15); color: #111827; }
    .form-control:focus { border-color: #4a90e2; box-shadow: 0 0 0 0.2rem rgba(74,144,226,0.15); background: #ffffff; color: #111827; }
    .form-control::placeholder { color: #6b7280; opacity: 1; }
    .input-group-text { background: #f8fafc; color: #334155; border: 1px solid rgba(0,0,0,0.15); }
    .form-label { color: #e2e8f0; font-weight: 500; margin-bottom: 0.5rem; }
    /* Forzar estilo cuando el navegador autocompleta */
    input.form-control:-webkit-autofill,
    input.form-control:-webkit-autofill:hover,
    input.form-control:-webkit-autofill:focus {
      -webkit-text-fill-color: #111827;
      box-shadow: 0 0 0px 1000px #ffffff inset;
      -webkit-box-shadow: 0 0 0px 1000px #ffffff inset;
      transition: background-color 5000s ease-in-out 0s;
    }
    .btn-primary { background: #4a90e2; border-color: #4a90e2; padding: 12px; font-weight: 600; }
    .btn-primary:hover { background: #3c7dc7; border-color: #3c7dc7; }
    .brand-footer { color: #64748b; font-size: 0.85rem; }
    .user-avatar { background: #4a90e2; color: #fff; }

    /* Mobile Responsiveness */
    @media (max-width: 576px) {
      body { align-items: flex-start; padding-top: 2rem; }
      .login-card {
        border: none;
        background: transparent;
        box-shadow: none;
        padding: 1rem;
      }
      .login-logo { justify-content: center; margin-bottom: 1.5rem; }
      .login-logo i { font-size: 2rem; }
      .login-title { font-size: 1.75rem; }
      .form-control, .btn-primary { height: 50px; }
    }
  </style>
</head>
<body class="corporate">
  <div class="login-card">
    <div class="text-center mb-3">
      <div class="login-logo">
        <i class="fas fa-gamepad"></i>
        <h4 class="login-title">GameControl</h4>
      </div>
      <p class="muted">Accede a tu panel de gestión</p>
    </div>

    <div id="alertContainer" class="mb-3"></div>

    <form id="loginForm" autocomplete="on">
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-at"></i></span>
          <input type="email" class="form-control" id="email" placeholder="tucorreo@dominio.com" required autocomplete="email" />
        </div>
      </div>

      <div class="mb-2">
        <label for="password" class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="input-group-text toggle-password" title="Mostrar/ocultar">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember" checked>
          <label class="form-check-label muted" for="remember">Mantener sesión</label>
        </div>
        <a class="small text-decoration-none" href="#" onclick="alert('Contacta al administrador para restablecer tu contraseña.'); return false;">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
      </button>
    </form>

    <div class="mt-4" id="systemInfo"></div>

    <div class="text-center mt-3 brand-footer">
      <small>
        <i class="fas fa-shield-alt me-1"></i>Conexión Segura
      </small>
    </div>
  </div>

  <!-- Dependencias -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Supabase primero -->
  <script>
    // En la página de login evitamos el poll de conexión
    // y si no hay internet, también evitamos la auto-inicialización para no generar bucles
    try {
      if (typeof navigator !== 'undefined' && navigator && navigator.onLine === false) {
        window.SUPABASE_SKIP_AUTO_INIT = true;
      }
    } catch (_) {}
    window.SUPABASE_SKIP_CONNECTION_POLL = true;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>

  <!-- Servicios y utilidades -->
  <script src="js/database-service.js"></script>
  <script src="js/navigation-utils.js"></script>
  <script src="js/mobile-compatibility.js"></script>

  <!-- Lógica de login -->
  <script src="js/login.app.js"></script>
</body>
</html>
