<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Salas Simple</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container mt-4">
        <h1>Debug Salas Simple</h1>
        
        <div class="row">
            <div class="col-md-12">
                <h3>Prueba de Salas</h3>
                
                <!-- Contenedor de salas -->
                <div id="contenedorSalas" class="salas-grid-minimal">
                    <!-- Las salas se cargarán aquí -->
                </div>
                
                <hr>
                
                <h3>Información de Debug</h3>
                <div id="debugInfo"></div>
                
                <h3>Consola del Navegador</h3>
                <div id="consoleOutput" style="background: #f8f9fa; padding: 15px; border-radius: 5px; font-family: monospace; max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        // Interceptar console.log para mostrar en la página
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('consoleOutput');
        
        function addToConsole(message, type = 'log') {
            const div = document.createElement('div');
            div.className = `text-${type === 'error' ? 'danger' : 'info'}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '));
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        // Datos de prueba
        const salasPrueba = [
            {
                id: '1',
                nombre: 'Sala PS5',
                tipo: 'ps5',
                numEstaciones: 4,
                prefijo: 'PS5',
                tarifa: 2000
            },
            {
                id: '2',
                nombre: 'Sala Xbox',
                tipo: 'xbox',
                numEstaciones: 2,
                prefijo: 'XB',
                tarifa: 1800
            }
        ];
        
        // Función para crear HTML de sala
        function crearHTMLSala(sala) {
            return `
                <div class="sala-card-minimal" data-id="${sala.id}" data-tipo="${sala.tipo}">
                    <div class="sala-header-minimal">
                        <div class="sala-info-minimal">
                            <div class="sala-title-minimal">
                                <i class="fas fa-gamepad"></i>
                                ${sala.nombre}
                                <span class="sala-type-badge">${sala.tipo.toUpperCase()}</span>
                            </div>
                            <div class="sala-stats-minimal">
                                <div class="sala-stat">
                                    <i class="fas fa-tv"></i>
                                    <span>${sala.numEstaciones} estaciones</span>
                                </div>
                                <div class="sala-stat">
                                    <i class="fas fa-dollar-sign"></i>
                                    <span class="tarifa-valor">$${sala.tarifa}/h</span>
                                </div>
                            </div>
                        </div>
                        <div class="sala-actions-minimal">
                            <button class="btn btn-outline-primary btn-sm" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="estaciones-grid-minimal">
                        ${generarHTMLEstaciones(sala)}
                    </div>
                    
                    <div class="sala-footer-minimal">
                        <div class="ocupacion-minimal">
                            <div class="ocupacion-item disponibles">
                                <i class="fas fa-check-circle"></i>
                                <span>${sala.numEstaciones} disponibles</span>
                            </div>
                            <div class="ocupacion-item ocupadas">
                                <i class="fas fa-circle text-danger"></i>
                                <span>0 ocupadas</span>
                            </div>
                        </div>
                        <div class="tarifa-minimal">
                            <span class="tarifa-label">Tarifa:</span>
                            <span class="tarifa-valor">$${sala.tarifa}/h</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function generarHTMLEstaciones(sala) {
            let html = '';
            for (let i = 1; i <= sala.numEstaciones; i++) {
                const estacion = `${sala.prefijo}${i}`;
                html += `
                    <div class="estacion-minimal disponible" data-estacion="${estacion}">
                        <div class="estacion-numero-minimal">${estacion}</div>
                        <div class="estacion-status-minimal">Libre</div>
                        <button class="btn btn-success btn-sm">
                            <i class="fas fa-play"></i>
                        </button>
                    </div>
                `;
            }
            return html;
        }
        
        // Función para cargar salas
        function cargarSalas() {
            console.log('Cargando salas de prueba...');
            const contenedor = document.getElementById('contenedorSalas');
            
            if (contenedor) {
                console.log('Contenedor encontrado, cargando', salasPrueba.length, 'salas');
                contenedor.innerHTML = salasPrueba.map(sala => crearHTMLSala(sala)).join('');
                console.log('Salas cargadas correctamente');
            } else {
                console.error('Contenedor no encontrado');
            }
        }
        
        // Función para mostrar información de debug
        function mostrarDebugInfo() {
            const debugInfo = document.getElementById('debugInfo');
            const contenedor = document.getElementById('contenedorSalas');
            
            debugInfo.innerHTML = `
                <p><strong>Contenedor:</strong> ${contenedor ? 'Encontrado' : 'NO ENCONTRADO'}</p>
                <p><strong>Clases del contenedor:</strong> ${contenedor ? contenedor.className : 'N/A'}</p>
                <p><strong>Salas de prueba:</strong> ${salasPrueba.length}</p>
                <p><strong>Window Width:</strong> ${window.innerWidth}px</p>
                <p><strong>CSS Loaded:</strong> ${document.styleSheets.length} hojas de estilo</li>
            `;
        }
        
        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM cargado, inicializando debug...');
            
            // Esperar un poco para que los estilos se carguen
            setTimeout(() => {
                cargarSalas();
                mostrarDebugInfo();
                
                // Verificar estilos CSS
                if (contenedor) {
                    const computedStyle = window.getComputedStyle(contenedor);
                    console.log('Estilos del contenedor:', {
                        display: computedStyle.display,
                        visibility: computedStyle.visibility,
                        opacity: computedStyle.opacity,
                        gridTemplateColumns: computedStyle.gridTemplateColumns
                    });
                }
            }, 100);
        });
    </script>
</body>
</html>
