<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dashboard - Carga de Datos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container-fluid mt-4">
        <h1 class="text-center mb-4">
            <i class="fas fa-tachometer-alt text-primary"></i>
            Test Dashboard - Carga de Datos
        </h1>

        <!-- Estado del Sistema -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle me-2"></i>Estado del Sistema</h5>
                    </div>
                    <div class="card-body">
                        <div id="estadoSistema" class="alert alert-info">
                            <i class="fas fa-spinner fa-spin me-2"></i>
                            Verificando estado del sistema...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Verificación de Módulos -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-cubes me-2"></i>Módulos Cargados</h5>
                    </div>
                    <div class="card-body">
                        <div id="modulosCargados"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-database me-2"></i>Conexión Supabase</h5>
                    </div>
                    <div class="card-body">
                        <div id="conexionSupabase"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Manager -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-chart-line me-2"></i>Dashboard Manager</h5>
                    </div>
                    <div class="card-body">
                        <div id="estadoDashboard"></div>
                        <div class="mt-3">
                            <button class="btn btn-primary me-2" onclick="testDashboardInit()">
                                <i class="fas fa-play me-2"></i>Inicializar Dashboard
                            </button>
                            <button class="btn btn-success me-2" onclick="testDataLoading()">
                                <i class="fas fa-download me-2"></i>Cargar Datos
                            </button>
                            <button class="btn btn-info me-2" onclick="testMetricsUpdate()">
                                <i class="fas fa-chart-bar me-2"></i>Actualizar Métricas
                            </button>
                            <button class="btn btn-warning me-2" onclick="testCharts()">
                                <i class="fas fa-chart-pie me-2"></i>Probar Gráficos
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Datos Cargados -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-users me-2"></i>Sesiones Activas</h5>
                    </div>
                    <div class="card-body">
                        <div id="sesionesActivas"></div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-boxes me-2"></i>Estado del Stock</h5>
                    </div>
                    <div class="card-body">
                        <div id="estadoStock"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Log del Sistema -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-terminal me-2"></i>Log del Sistema</h5>
                        <button class="btn btn-sm btn-outline-secondary float-end" onclick="limpiarLog()">
                            <i class="fas fa-trash me-1"></i>Limpiar
                        </button>
                    </div>
                    <div class="card-body">
                        <div id="logSistema" style="max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.9rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/database-service.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/stock.js"></script>
    <script src="js/salas.js"></script>
    <script src="js/ventas.js"></script>
    <script src="js/gastos.js"></script>
    <script src="js/reportes.js"></script>
    <script src="js/usuarios.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>

    <script>
        // Función para agregar logs
        function agregarLog(mensaje, tipo = 'info') {
            const logContainer = document.getElementById('logSistema');
            const timestamp = new Date().toLocaleTimeString();
            const icon = tipo === 'error' ? '❌' : tipo === 'success' ? '✅' : tipo === 'warning' ? '⚠️' : 'ℹ️';
            const color = tipo === 'error' ? 'text-danger' : tipo === 'success' ? 'text-success' : tipo === 'warning' ? 'text-warning' : 'text-info';
            
            const logEntry = document.createElement('div');
            logEntry.className = `mb-1 ${color}`;
            logEntry.innerHTML = `<small>[${timestamp}]</small> ${icon} ${mensaje}`;
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Función para limpiar log
        function limpiarLog() {
            document.getElementById('logSistema').innerHTML = '';
        }

        // Verificar estado del sistema
        function verificarEstadoSistema() {
            const estadoContainer = document.getElementById('estadoSistema');
            const modulosContainer = document.getElementById('modulosCargados');
            const conexionContainer = document.getElementById('conexionSupabase');

            // Verificar módulos
            const modulos = {
                'Supabase Config': !!window.supabaseConfig,
                'Database Service': !!window.databaseService,
                'Auth': !!window.authService,
                'Stock': !!window.gestorStock,
                'Salas': !!window.gestorSalas,
                'Dashboard': !!window.DashboardManager
            };

            let modulosHTML = '';
            Object.entries(modulos).forEach(([modulo, disponible]) => {
                const icon = disponible ? '✅' : '❌';
                const color = disponible ? 'text-success' : 'text-danger';
                modulosHTML += `<div class="${color}">${icon} ${modulo}</div>`;
            });
            modulosContainer.innerHTML = modulosHTML;

            // Verificar conexión Supabase
            if (window.databaseService) {
                window.databaseService.verificarConexionObligatoria()
                    .then(() => {
                        conexionContainer.innerHTML = '<div class="text-success">✅ Conectado a Supabase</div>';
                        estadoContainer.className = 'alert alert-success';
                        estadoContainer.innerHTML = '<i class="fas fa-check-circle me-2"></i>Sistema funcionando correctamente';
                        agregarLog('Sistema verificado correctamente', 'success');
                    })
                    .catch(error => {
                        conexionContainer.innerHTML = '<div class="text-danger">❌ Error de conexión</div>';
                        estadoContainer.className = 'alert alert-danger';
                        estadoContainer.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Error de conexión a Supabase';
                        agregarLog(`Error de conexión: ${error.message}`, 'error');
                    });
            } else {
                conexionContainer.innerHTML = '<div class="text-warning">⚠️ Database Service no disponible</div>';
                estadoContainer.className = 'alert alert-warning';
                estadoContainer.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>Esperando servicios del sistema...';
            }
        }

        // Test de inicialización del dashboard
        function testDashboardInit() {
            agregarLog('Iniciando test de inicialización del dashboard...', 'info');
            
            try {
                if (window.DashboardManager) {
                    agregarLog('DashboardManager disponible', 'success');
                    
                    if (window.dashboardManagerInstance) {
                        agregarLog('Instancia singleton ya existe', 'info');
                        window.dashboardManager = window.dashboardManagerInstance;
                    } else {
                        agregarLog('Creando nueva instancia de DashboardManager...', 'info');
                        window.dashboardManager = new window.DashboardManager();
                    }
                    
                    agregarLog('Dashboard inicializado correctamente', 'success');
                    document.getElementById('estadoDashboard').innerHTML = '<div class="text-success">✅ Dashboard inicializado</div>';
                } else {
                    agregarLog('DashboardManager no disponible', 'error');
                    document.getElementById('estadoDashboard').innerHTML = '<div class="text-danger">❌ DashboardManager no disponible</div>';
                }
            } catch (error) {
                agregarLog(`Error inicializando dashboard: ${error.message}`, 'error');
                document.getElementById('estadoDashboard').innerHTML = `<div class="text-danger">❌ Error: ${error.message}</div>`;
            }
        }

        // Test de carga de datos
        async function testDataLoading() {
            agregarLog('Iniciando test de carga de datos...', 'info');
            
            if (!window.dashboardManager) {
                agregarLog('Dashboard no inicializado', 'warning');
                return;
            }

            try {
                await window.dashboardManager.cargarDatos();
                agregarLog('Datos cargados correctamente', 'success');
                
                // Mostrar resumen de datos
                const datos = window.dashboardManager.datos;
                agregarLog(`Sesiones: ${datos.sesiones.length}`, 'info');
                agregarLog(`Salas: ${datos.salas.length}`, 'info');
                agregarLog(`Productos: ${datos.productos.length}`, 'info');
                agregarLog(`Gastos: ${datos.gastos.length}`, 'info');
                
            } catch (error) {
                agregarLog(`Error cargando datos: ${error.message}`, 'error');
            }
        }

        // Test de actualización de métricas
        async function testMetricsUpdate() {
            agregarLog('Iniciando test de actualización de métricas...', 'info');
            
            if (!window.dashboardManager) {
                agregarLog('Dashboard no inicializado', 'warning');
                return;
            }

            try {
                await window.dashboardManager.actualizarMetricas();
                agregarLog('Métricas actualizadas correctamente', 'success');
                
                // Mostrar métricas calculadas
                const metricasHoy = window.dashboardManager.calcularMetricasHoy();
                agregarLog(`Ingresos del día: ${metricasHoy.ingresosDia}`, 'info');
                agregarLog(`Clientes activos: ${metricasHoy.clientesActivos}`, 'info');
                agregarLog(`Ocupación: ${metricasHoy.porcentajeOcupacion}%`, 'info');
                
            } catch (error) {
                agregarLog(`Error actualizando métricas: ${error.message}`, 'error');
            }
        }

        // Test de gráficos
        function testCharts() {
            agregarLog('Iniciando test de gráficos...', 'info');
            
            if (!window.dashboardManager) {
                agregarLog('Dashboard no inicializado', 'warning');
                return;
            }

            try {
                window.dashboardManager.inicializarGraficos();
                agregarLog('Gráficos inicializados correctamente', 'success');
            } catch (error) {
                agregarLog(`Error inicializando gráficos: ${error.message}`, 'error');
            }
        }

        // Inicialización cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', () => {
            agregarLog('Página cargada, iniciando verificación del sistema...', 'info');
            
            // Verificar estado inicial
            verificarEstadoSistema();
            
            // Verificar cada 2 segundos
            setInterval(verificarEstadoSistema, 2000);
            
            // Esperar a que los módulos se carguen y verificar dashboard
            setTimeout(() => {
                if (window.DashboardManager) {
                    agregarLog('DashboardManager detectado, verificando estado...', 'info');
                    testDashboardInit();
                } else {
                    agregarLog('DashboardManager aún no disponible', 'warning');
                }
            }, 3000);
        });
    </script>
</body>
</html>
