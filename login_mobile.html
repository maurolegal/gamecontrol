<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciar Sesión - GameControl Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #334155;
            --text-color: #f8fafc;
            --primary-color: #3b82f6;
            --input-border: #475569;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .mobile-login-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .app-subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 18px;
            z-index: 10;
        }

        .form-control-mobile {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 16px 16px 16px 48px; /* Left padding for icon */
            color: white;
            font-size: 16px; /* Prevents zoom on iOS */
            transition: all 0.2s;
            height: 56px;
            box-sizing: border-box;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-control-mobile:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            background-color: #1e293b;
        }

        .form-control-mobile::placeholder {
            color: #64748b;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            background: none;
            border: none;
            padding: 0;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn-login:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .custom-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #cbd5e1;
        }

        .custom-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }

        .forgot-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .footer-info {
            text-align: center;
            margin-top: 40px;
            color: #475569;
            font-size: 12px;
        }

        /* Autofill fix */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px var(--card-bg) inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>

    <div class="mobile-login-container login-container">
        <div class="logo-section">
            <i class="fas fa-gamepad logo-icon"></i>
            <h1 class="app-title">GameControl</h1>
            <p class="app-subtitle">Accede a tu panel de gestión</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="email" class="form-label">Correo electrónico</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" class="form-control-mobile" placeholder="ejemplo@correo.com" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" class="form-control-mobile" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="toggle-password" id="togglePasswordBtn">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="options-row">
                <label class="custom-checkbox">
                    <input type="checkbox" id="remember" checked>
                    <span>Mantener sesión</span>
                </label>
                <a href="#" class="forgot-link" onclick="alert('Contacta al administrador.'); return false;">¿Olvidaste?</a>
            </div>

            <button type="submit" class="btn-login">
                Iniciar Sesión
            </button>
        </form>

        <div class="footer-info">
            <i class="fas fa-shield-alt"></i> Conexión Segura
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Toggle password visibility
        document.getElementById('togglePasswordBtn').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    </script>

    <!-- Supabase & App Logic -->
    <script>
        window.SUPABASE_SKIP_CONNECTION_POLL = true;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/database-service.js"></script>
    <script src="js/navigation-utils.js"></script>
    <script src="js/mobile-compatibility.js"></script>
    <script src="js/login.app.js"></script>

</body>
</html>
